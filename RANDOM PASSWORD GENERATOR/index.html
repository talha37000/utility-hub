<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultGen | Secure Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="glass-vault">
        <div class="header">
            <i class="fas fa-shield-alt"></i>
            <h2>VaultGen</h2>
        </div>

        <div class="display-box">
            <input type="text" id="input" placeholder="Click Generate" readonly />
            <button class="copy-btn" title="Copy to Clipboard">
                <i class="far fa-copy"></i>
            </button>
        </div>

        <div class="strength-meter">
            <div id="strength-bar"></div>
        </div>

        <div class="settings">
            <div class="length-header">
                <span>Password Length</span>
                <span id="length-val">14</span>
            </div>
            <input type="range" id="length-slider" min="8" max="32" value="14" />
        </div>

        <button class="btn-generate">
            <span>Generate Secure Key</span>
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <div class="notification" id="alert">
        <i class="fas fa-check-circle"></i>
        <span>Copied to Clipboard</span>
    </div>

    <script src="index.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="heading">Body Mass Indux (BMI) Calculator</h1>
        Your Height (cm):
        <input type="number" step="10" class="height" id="height" value="180" placeholder="Your Height In Cm">
        Your Weight (kg):
        <input type="number" step="10" class="weight" id="weight" value="80" placeholder="Your Weight In kg">
        <button class="btn" id="btn">Compute BMI</button>
        <input disabled type="number" class="bmivalue" id="bmivalue">
        <h4 class="condition" id="condition">Weight Condition :<span id="weightCONDITION">

            </span></h4>
        <script src="index.js"></script>
    </div>
</body>

</html>

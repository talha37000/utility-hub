<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="container">
        <h1>Age Calculator</h1>
        <div id="form">
            <label for="birthday">When were you born?</label>
            <input type="date" id="birthday" class="birthday">
            <button id="calculate">Calculate Age</button>
        </div>

        <div id="result-container" class="hidden">
            <p id="result-text"></p>
            <div class="stats">
                <div class="stat-box"><span id="years">-</span><small>Years</small></div>
                <div class="stat-box"><span id="months">-</span><small>Months</small></div>
                <div class="stat-box"><span id="days">-</span><small>Days</small></div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>

    <div id="footer"></div>
    <script src="../layout.js"></script>
</body>

</html>

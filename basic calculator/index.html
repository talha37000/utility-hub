<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tech Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="bg-animation"></div>
    <div class="calculator">
        <div class="screen-container">
            <div class="scanline"></div>
            <input type="text" id="result" readonly placeholder="0">
        </div>
        <div class="buttons">
            <button class="clear btn-glow">C</button>
            <button class="operators btn-glow">/</button>
            <button class="operators btn-glow">*</button>
            <button class="delete btn-glow">DEL</button>

            <button class="numbers">7</button>
            <button class="numbers">8</button>
            <button class="numbers">9</button>
            <button class="operators btn-glow">-</button>

            <button class="numbers">4</button>
            <button class="numbers">5</button>
            <button class="numbers">6</button>
            <button class="operators btn-glow">+</button>

            <button class="numbers">1</button>
            <button class="numbers">2</button>
            <button class="numbers">3</button>
            <button class="equal btn-glow">=</button>

            <button class="numbers zero">0</button>
            <button class="numbers">.</button>
        </div>
    </div>
    <script src="index.js"></script>

    <div id="footer"></div>
    <script src="../layout.js"></script>
</body>

</html>

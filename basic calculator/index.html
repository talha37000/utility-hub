<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tech Calculator - Utility Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="navbar">
        <nav>
            <div class="right">
                <i class="fa-solid fa-bars"></i>
                <span>Quick Links</span>
                <div class="dropdown">
                    <a href="../index.html"><i class="fa-solid fa-house"></i><span> Home</span></a>
                    <a href="../AboutUs.html"><i class="fa-solid fa-circle-info"></i><span> About Us</span></a>
                    <a href="../contactUs.html"><i class="fa-solid fa-phone"></i><span> Contact Us</span></a>
                </div>
            </div>
            <a href="../index.html">
                <img class="logo" src="../media/gemini-svg.svg" alt="logo">
            </a>
            <!-- Specific class added here: main-nav-form -->
            <form class="search-box main-nav-form" action="../search.html" method="get">
                <input type="text" name="q" placeholder="Search tools..." required>
                <button type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </nav>
    </div>

    <main class="calculator-wrapper">
        <div class="bg-animation"></div>
        <div class="calculator">
            <div class="screen-container">
                <div class="scanline"></div>
                <input type="text" id="result" readonly placeholder="0">
            </div>
            <div class="buttons">
                <button class="clear btn-glow">C</button>
                <button class="operators btn-glow">/</button>
                <button class="operators btn-glow">*</button>
                <button class="delete btn-glow">DEL</button>

                <button class="numbers">7</button>
                <button class="numbers">8</button>
                <button class="numbers">9</button>
                <button class="operators btn-glow">-</button>

                <button class="numbers">4</button>
                <button class="numbers">5</button>
                <button class="numbers">6</button>
                <button class="operators btn-glow">+</button>

                <button class="numbers">1</button>
                <button class="numbers">2</button>
                <button class="numbers">3</button>
                <button class="equal btn-glow">=</button>

                <button class="numbers zero">0</button>
                <button class="numbers">.</button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div class="footer">
        <div class="mainfooter">
            <div class="name">
                <h2>Utility Hub</h2>
                <p>Simplifying everyday tasks with smart, fast, and reliable tools.</p>
            </div>
            <div class="explore">
                <h2>Explore</h2>
                <a href="../index.html"><span>Home</span></a>
                <a href="../index.html#heading"><span>All Tools</span></a>
                <a href="../AboutUs.html">Features</a>
                <a href="../contactUs.html">Contact</a>
            </div>
            <div class="populartools">
                <h2>Popular Tools</h2>
                <a href="../basic calculator/index.html">Calculator</a>
                <a href="../BMI CALCULATOR/INDEX.HTML">BMI Calculator</a>
                <a href="../CURRENCY CONVERTER/INDEX.HTML">Currency Convertor</a>
                <a href="../RANDOM PASSWORD GENERATOR/index.html">Password Generator</a>
            </div>
        </div>
        <div class="bottom">
            <p>© 2026 Utility Hub • Built with simplicity in mind</p>
        </div>
    </div>

    <script src="../index.js"></script>
    <script src="index.js"></script>
</body>

</html>

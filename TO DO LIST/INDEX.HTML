<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="STYLE.CSS">
</head>

<body>
    <div class="dashboard">
        <header>
            <div class="date-info">
                <h2 id="current-date">Today's Tasks</h2>
                <p id="task-count">0 tasks pending</p>
            </div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </header>

        <form class="form">
            <div class="input-wrapper">
                <input type="text" class="input" placeholder="Add a new goal..." autocomplete="off">
                <button type="submit" class="add-btn"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ul class="list"></ul>
        </form>
    </div>
    <script src="INDEX.JS"></script>
</body>

</html>

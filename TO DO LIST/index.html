<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Task Manager - Utility Hub</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Global Main CSS (Nav/Footer) -->
    <link rel="stylesheet" href="../style.css">
    <!-- Local Tool CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 1. NAVBAR -->
    <div class="navbar">
        <nav>
            <div class="right">
                <i class="fa-solid fa-bars"></i>
                <span>Quick Links</span>
                <div class="dropdown">
                    <a href="../index.html"><i class="fa-solid fa-house"></i><span> Home</span></a>
                    <a href="../AboutUs.html"><i class="fa-solid fa-circle-info"></i><span> About Us</span></a>
                    <a href="../contactUs.html"><i class="fa-solid fa-phone"></i><span> Contact Us</span></a>
                </div>
            </div>
            <a href="../index.html">
                <img class="logo" src="../media/gemini-svg.svg" alt="logo">
            </a>
            <form class="search-box" action="../search.html" method="get">
                <input type="text" name="q" placeholder="Search tools..." required>
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </nav>
    </div>

    <!-- 2. TOOL CONTENT -->
    <main class="tool-wrapper">
        <div class="todo-container">
            <header>
                <h1>My Tasks</h1>
                <p id="task-count">0 tasks pending</p>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </header>

            <form class="form">
                <input type="text" class="input" placeholder="Enter a task..." autocomplete="off">
                <button type="submit" class="add-btn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>

            <ul class="list">
                <!-- Tasks dynamically added here -->
            </ul>
        </div>
    </main>

    <!-- 3. FOOTER -->
    <div class="footer">
        <div class="mainfooter">
            <div class="name">
                <h2>Utility Hub</h2>
                <p>Simplifying everyday tasks with smart tools.</p>
            </div>
            <div class="explore">
                <h2>Explore</h2>
                <a href="../index.html">Home</a>
                <a href="../contactUs.html">Contact</a>
            </div>
            <div class="populartools">
                <h2>Popular Tools</h2>
                <a href="../basic calculator/index.html">Calculator</a>
                <a href="../BMI CALCULATOR/INDEX.HTML">BMI Calculator</a>
            </div>
        </div>
        <div class="bottom">
            <p>© 2026 Utility Hub • Built with simplicity in mind</p>
        </div>
    </div>

    <script src="index.js"></script>
    <script src="../index.js"></script>

</body>

</html>
